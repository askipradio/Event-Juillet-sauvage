<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Admin - Askip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen">

    <!-- Écran de connexion -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl text-center border border-yellow-500">
            <h2 class="text-2xl font-bold mb-6">Accès Administration</h2>
            <input type="password" id="admin-pass" placeholder="Mot de passe"
                class="w-full p-3 rounded bg-gray-900 text-white border border-gray-700 mb-4">
            <button onclick="verifierMotDePasse()"
                class="w-full bg-yellow-500 text-black font-bold py-3 rounded hover:bg-yellow-400">
                Entrer
            </button>
            <p id="login-erreur" class="text-red-500 mt-4 hidden">Mot de passe incorrect.</p>
        </div>
    </div>

    <!-- Interface Admin (Cachée par défaut) -->
    <div id="admin-panel" class="hidden p-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-yellow-500">Administration des Candidats</h1>
            <button onclick="deconnexion()"
                class="bg-red-600 px-4 py-2 rounded font-bold hover:bg-red-500">Déconnexion</button>
        </div>

        <div class="overflow-x-auto bg-gray-800 rounded-lg p-4">
            <table class="w-full text-left border-collapse text-sm">
                <thead>
                    <tr class="bg-gray-900 text-yellow-500">
                        <th class="p-3 rounded-tl">Artiste</th>
                        <th class="p-3">Images</th>
                        <th class="p-3">Morceau & Audio</th>
                        <th class="p-3">Contact & Réseaux</th>
                        <th class="p-3 text-center">Votes</th>
                        <th class="p-3 rounded-tr text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="admin-list">
                    <!-- Les données s'affichent ici -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://lkzhmvqfgjlrqpwrfbkt.supabase.co';
        const supabaseKey = 'sb_publishable_PxgI160bvtu1IVMOrIATvQ_mLR3W120';
        const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

        // Vérifie si on est déjà connecté via Supabase
        async function verifierSession() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (session) {
                afficherInterface();
            }
        }
        verifierSession();

        // Vraie connexion Supabase
        async function verifierMotDePasse() {
            const email = "digital@askipradiotv.com"; // Mets l'email que tu as créé dans Supabase
            const mdp = document.getElementById('admin-pass').value;

            const { error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: mdp
            });

            if (error) {
                document.getElementById('login-erreur').classList.remove('hidden');
            } else {
                afficherInterface();
            }
        }

        function afficherInterface() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('admin-panel').classList.remove('hidden');
            chargerAdmin();
        }

        async function deconnexion() {
            await supabaseClient.auth.signOut();
            document.getElementById('admin-pass').value = '';
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('login-screen').classList.remove('hidden');
        }

        document.getElementById('admin-pass').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') verifierMotDePasse();
        });

        // Le reste du code (chargerAdmin, envoyerAzuracast, supprimer) ne change pas !

        async function chargerAdmin() {
            const { data, error } = await supabaseClient.from('artistes').select('*, votes(count)').order('created_at', { ascending: false });
            if (error) return alert('Erreur de chargement.');

            const tbody = document.getElementById('admin-list');
            tbody.innerHTML = '';

            data.forEach(art => {
                const audioUrl = `${supabaseUrl}/storage/v1/object/public/audios/${art.audio_path}`;
                const photoUrl = art.image_path ? `${supabaseUrl}/storage/v1/object/public/images/${art.image_path}` : '';
                const coverUrl = art.cover_son_path ? `${supabaseUrl}/storage/v1/object/public/images/${art.cover_son_path}` : '';
                const nbVotes = art.votes[0]?.count || 0;
                const nomSafe = art.nom.replace(/'/g, "\\'");
                const titreSafe = (art.titre_son || 'Inconnu').replace(/'/g, "\\'");

                tbody.innerHTML += `
                    <tr class="border-b border-gray-700 hover:bg-gray-700">
                        <td class="p-3 font-bold">${art.nom}</td>
                        <td class="p-3 flex gap-2">
                            ${photoUrl ? `<img src="${photoUrl}" class="w-12 h-12 object-cover rounded">` : '<div class="w-12 h-12 bg-gray-900 rounded text-xs flex items-center justify-center">N/A</div>'}
                            ${coverUrl ? `<img src="${coverUrl}" class="w-12 h-12 object-cover rounded">` : '<div class="w-12 h-12 bg-gray-900 rounded text-xs flex items-center justify-center">N/A</div>'}
                        </td>
                        <td class="p-3">
                            <span class="font-bold text-yellow-400">${art.titre_son || 'Inconnu'}</span><br>
                            <audio controls src="${audioUrl}" class="h-8 w-48 mt-1"></audio>
                        </td>
                        <td class="p-3 text-xs">
                            <a href="mailto:${art.email}" class="text-blue-300 hover:underline">${art.email}</a><br>
                            ${art.tiktok ? `<a href="${art.tiktok}" target="_blank" class="text-pink-400 hover:underline">TikTok</a> | ` : ''}
                            ${art.insta ? `<a href="${art.insta}" target="_blank" class="text-purple-400 hover:underline">Insta</a> | ` : ''}
                            ${art.youtube ? `<a href="${art.youtube}" target="_blank" class="text-red-400 hover:underline">YouTube</a>` : ''}
                        </td>
                        <td class="p-3 text-center font-bold text-lg text-green-400">${nbVotes}</td>
                        <td class="p-3 text-center space-y-2">
                            <button onclick="envoyerAzuracast('${nomSafe}', '${titreSafe}', '${audioUrl}')" class="block w-full bg-blue-600 px-3 py-1 rounded hover:bg-blue-500">Azuracast</button>
                            <button onclick="supprimer(${art.id})" class="block w-full bg-red-600 px-3 py-1 rounded hover:bg-red-500">Supprimer</button>
                        </td>
                    </tr>
                `;
            });
        }

        async function supprimer(id) {
            if (!confirm('Attention, cela supprimera l\'artiste et tous ses votes. Confirmer ?')) return;
            try {
                const { error } = await supabaseClient.from('artistes').delete().eq('id', id);
                if (error) throw error;
                await chargerAdmin();
            } catch (err) {
                alert("Erreur lors de la suppression : " + err.message);
            }
        }


        async function envoyerAzuracast(artiste, titre, audioUrl) {

            alert(`Envoi en cours pour ${artiste}... Patiente un instant.`);

            try {
                // Téléchargement depuis Supabase et transformation
                const response = await fetch(audioUrl);
                const blob = await response.blob();
                const nomPropre = `${artiste.replace(/[^a-z0-9]/gi, '_')}_-${titre.replace(/[^a-z0-9]/gi, '_')}.mp3`;

                const base64String = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onload = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = error => reject(error);
                });

                // On envoie tout à ton fichier PHP caché
                const reqRelais = await fetch('./relais.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        path: nomPropre,
                        file: base64String
                    })
                });
                
                const resultat = await reqRelais.json();W
                
                if (resultat.erreur) throw new Error(resultat.erreur);
                
                alert(`✅ Succès : Le son de ${artiste} a été ajouté à AzuraCast !`);
            } catch (err) {
                alert("Erreur : " + err.message);
            }
        }
    </script>
</body>

</html>
